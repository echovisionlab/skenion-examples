name: Release Examples Compatibility

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Prepare, publish, or verify the examples release tag.
        required: true
        default: prepare
        type: choice
        options:
          - prepare
          - publish
          - verify
      dry_run:
        description: Keep publish mode non-mutating unless explicitly false.
        required: true
        default: true
        type: boolean
      contracts_line:
        description: Contracts compatibility line, such as 0.45.
        required: true
        default: "0.45"
        type: string
      matrix_ref:
        description: Matrix repository ref. Publish/verify require a 40-character commit SHA; prepare may use a branch/ref.
        required: true
        type: string
      matrix_path:
        description: Repository-relative compatibility matrix path.
        required: true
        default: releases/compatibility/0.45.json
        type: string
      target_ref:
        description: Examples commit/ref to validate or tag. Publish/verify require the matrix commit SHA.
        required: false
        type: string
      runtime_target:
        description: Runtime binary target to smoke test for examples conformance.
        required: true
        default: x86_64-unknown-linux-gnu
        type: string

permissions:
  contents: read

concurrency:
  group: examples-compatibility-${{ inputs.contracts_line }}
  cancel-in-progress: false

jobs:
  release-examples:
    name: Released-artifact examples compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Validate dispatch refs
        run: |
          set -euo pipefail
          if [[ ! "${CONTRACTS_LINE}" =~ ^0\.(0|[1-9][0-9]*)$ ]]; then
            echo "contracts_line must be a v0 minor line such as 0.45, got ${CONTRACTS_LINE}" >&2
            exit 1
          fi
          expected_matrix_path="releases/compatibility/${CONTRACTS_LINE}.json"
          if [[ "${MATRIX_PATH}" != "${expected_matrix_path}" ]]; then
            echo "matrix_path must be exactly ${expected_matrix_path}; got ${MATRIX_PATH}" >&2
            exit 1
          fi
          if [[ "${MODE}" == "prepare" ]]; then
            if [[ -n "${TARGET_REF}" && ! "${TARGET_REF}" =~ ^[0-9a-fA-F]{40}$ && ! "${TARGET_REF}" =~ ^skenion-examples-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "prepare mode target_ref must be omitted, a 40-character commit SHA, or an exact skenion-examples-vX.Y.Z tag; got ${TARGET_REF}" >&2
              exit 1
            fi
            exit 0
          fi
          if [[ ! "${MATRIX_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "publish/verify mode requires matrix_ref to be a 40-character commit SHA, got ${MATRIX_REF}" >&2
            exit 1
          fi
          if [[ ! "${TARGET_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "publish/verify mode requires target_ref to be a 40-character commit SHA, got ${TARGET_REF}" >&2
            exit 1
          fi
          if [[ "${MODE}" != "prepare" && -z "${GH_TOKEN:-}" ]]; then
            echo "publish/verify mode requires secrets.GH_TOKEN for repository checkout and release artifact access" >&2
            exit 1
          fi
        env:
          MODE: ${{ inputs.mode }}
          DRY_RUN: ${{ inputs.dry_run }}
          CONTRACTS_LINE: ${{ inputs.contracts_line }}
          MATRIX_PATH: ${{ inputs.matrix_path }}
          MATRIX_REF: ${{ inputs.matrix_ref }}
          TARGET_REF: ${{ inputs.target_ref }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Check out examples candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false

      - name: Self-test compatibility matrix validator
        run: node scripts/validate-compatibility-matrix-self-test.mjs

      - name: Check out compatibility matrix
        uses: actions/checkout@v6
        with:
          repository: skenion/skenion
          ref: ${{ inputs.matrix_ref }}
          path: .release/matrix
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false

      - name: Validate compatibility matrix for examples release
        id: matrix
        run: >-
          node scripts/validate-compatibility-matrix.mjs
          --matrix ".release/matrix/${MATRIX_PATH}"
          --contracts-line "${CONTRACTS_LINE}"
          --mode "${MODE}"
          --runtime-target "${RUNTIME_TARGET}"
          --target-ref "${TARGET_REF}"
          --matrix-ref "${MATRIX_REF}"
          --matrix-repository skenion/skenion
          --out-dir .skenion-matrix
        env:
          MATRIX_PATH: ${{ inputs.matrix_path }}
          MATRIX_REF: ${{ inputs.matrix_ref }}
          CONTRACTS_LINE: ${{ inputs.contracts_line }}
          MODE: ${{ inputs.mode }}
          RUNTIME_TARGET: ${{ inputs.runtime_target }}
          TARGET_REF: ${{ inputs.target_ref }}

      - name: Install released Contracts and SDK packages
        run: >-
          npm install --ignore-scripts --no-audit --no-fund --no-save
          "@skenion/contracts@${CONTRACTS_VERSION}"
          "@skenion/sdk@${SDK_VERSION}"
        env:
          CONTRACTS_VERSION: ${{ steps.matrix.outputs.contracts_npm_version }}
          SDK_VERSION: ${{ steps.matrix.outputs.sdk_npm_version }}

      - name: Assert released Contracts package version
        run: |
          set -euo pipefail
          node -e 'const fs = require("fs"); const version = JSON.parse(fs.readFileSync("node_modules/@skenion/contracts/package.json", "utf8")).version; if (version !== process.env.CONTRACTS_VERSION) { throw new Error(`@skenion/contracts version ${version} does not match matrix ${process.env.CONTRACTS_VERSION}`); }'
        env:
          CONTRACTS_VERSION: ${{ steps.matrix.outputs.contracts_npm_version }}

      - name: Assert released SDK package version
        run: |
          set -euo pipefail
          node -e 'const fs = require("fs"); const version = JSON.parse(fs.readFileSync("node_modules/@skenion/sdk/package.json", "utf8")).version; if (version !== process.env.SDK_VERSION) { throw new Error(`@skenion/sdk version ${version} does not match matrix ${process.env.SDK_VERSION}`); }'
        env:
          SDK_VERSION: ${{ steps.matrix.outputs.sdk_npm_version }}

      - name: Validate fixtures with released Contracts
        run: |
          set -euo pipefail
          node scripts/validate-with-contracts.mjs
          node scripts/validate-repo-path-references.mjs
          node scripts/audit-node-conventions.mjs
          node scripts/validate-runtime-project-payloads.mjs
          node scripts/validate-runtime-session-smoke-fixtures.mjs
        env:
          SKENION_RELEASE_MODE: "1"

      - name: Validate fixtures with released SDK helpers
        run: >-
          node scripts/validate-sdk-compatibility.mjs
          --matrix ".release/matrix/${MATRIX_PATH}"
          --contracts-line "${CONTRACTS_LINE}"
        env:
          MATRIX_PATH: ${{ inputs.matrix_path }}
          CONTRACTS_LINE: ${{ inputs.contracts_line }}
          SKENION_RELEASE_MODE: "1"

      - name: Download released Runtime binary
        if: ${{ inputs.mode != 'prepare' }}
        id: runtime
        run: |
          set -euo pipefail
          mkdir -p .release/runtime-archive .release/runtime-bin
          gh release download "${RUNTIME_TAG}" \
            --repo "${RUNTIME_REPOSITORY}" \
            --pattern "${RUNTIME_ASSET}" \
            --dir .release/runtime-archive \
            --clobber

          archive=".release/runtime-archive/${RUNTIME_ASSET}"
          if [[ -z "${RUNTIME_SHA256}" ]]; then
            echo "matrix checksum is required before extracting ${RUNTIME_ASSET}" >&2
            exit 1
          fi
          printf '%s  %s\n' "${RUNTIME_SHA256}" "${RUNTIME_ASSET}" > ".release/runtime-archive/${RUNTIME_ASSET}.sha256"
          (
            cd .release/runtime-archive
            sha256sum -c "${RUNTIME_ASSET}.sha256"
          )

          case "${archive}" in
            *.tar.gz|*.tgz)
              tar -xzf "${archive}" -C .release/runtime-bin
              ;;
            *.zip)
              unzip -q "${archive}" -d .release/runtime-bin
              ;;
            *)
              echo "unsupported Runtime asset archive: ${archive}" >&2
              exit 1
              ;;
          esac

          runtime_bin="$(find .release/runtime-bin -type f -name 'skenion-runtime' -perm -111 | head -n 1)"
          if [[ -z "${runtime_bin}" ]]; then
            runtime_bin="$(find .release/runtime-bin -type f -name 'skenion-runtime' | head -n 1)"
          fi
          if [[ -z "${runtime_bin}" ]]; then
            echo "skenion-runtime executable not found in ${RUNTIME_ASSET}" >&2
            exit 1
          fi
          chmod +x "${runtime_bin}"
          echo "runtime_bin=${runtime_bin}" >> "${GITHUB_OUTPUT}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RUNTIME_REPOSITORY: ${{ steps.matrix.outputs.runtime_repository }}
          RUNTIME_TAG: ${{ steps.matrix.outputs.runtime_tag }}
          RUNTIME_ASSET: ${{ steps.matrix.outputs.runtime_asset }}
          RUNTIME_SHA256: ${{ steps.matrix.outputs.runtime_sha256 }}

      - name: Validate fixtures with released Runtime CLI
        if: ${{ inputs.mode != 'prepare' }}
        run: bash scripts/validate-with-runtime.sh .release/no-local-runtime
        env:
          SKENION_RELEASE_MODE: "1"
          SKENION_RUNTIME_BIN: ${{ steps.runtime.outputs.runtime_bin }}

      - name: Validate fixtures with released Runtime server
        if: ${{ inputs.mode != 'prepare' }}
        run: |
          set -euo pipefail
          SKENION_PREVIEW_DRY_RUN=1 "${SKENION_RUNTIME_BIN}" serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-project-payloads.mjs
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-v01-projects.sh
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-session-smoke-fixtures.mjs
              exit 0
            fi
            sleep 1
          done

          echo "released Runtime health endpoint did not become ready" >&2
          exit 1
        env:
          SKENION_RELEASE_MODE: "1"
          SKENION_RUNTIME_BIN: ${{ steps.runtime.outputs.runtime_bin }}

      - name: Produce or verify examples release tag
        run: |
          set -euo pipefail
          if [[ "${MODE}" == "publish" && "${DRY_RUN}" == "false" ]]; then
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/skenion/skenion-examples.git"
          fi
          node scripts/manage-release-tag.mjs \
            --mode "${MODE}" \
            --dry-run "${DRY_RUN}" \
            --tag "${EXAMPLES_TAG}" \
            --version "${EXAMPLES_VERSION}" \
            --commit "${EXAMPLES_COMMIT:-$(git rev-parse HEAD)}"
        env:
          MODE: ${{ inputs.mode }}
          DRY_RUN: ${{ inputs.dry_run }}
          EXAMPLES_VERSION: ${{ steps.matrix.outputs.examples_version }}
          EXAMPLES_TAG: ${{ steps.matrix.outputs.examples_tag }}
          EXAMPLES_COMMIT: ${{ steps.matrix.outputs.examples_commit }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Summarize release conformance
        run: |
          {
            echo "## Examples Release Compatibility"
            echo
            echo "- Contracts line: ${CONTRACTS_LINE}"
            echo "- Mode: ${MODE}"
            echo "- Examples tag: ${EXAMPLES_TAG}"
            echo "- Contracts: @skenion/contracts@${CONTRACTS_VERSION}"
            echo "- Contracts range: ${CONTRACTS_RANGE}"
            echo "- SDK: @skenion/sdk@${SDK_VERSION}"
            echo "- SDK supported Contracts: ${SDK_CONTRACTS_RANGE}"
            echo "- Runtime artifact: ${RUNTIME_REPOSITORY}@${RUNTIME_TAG}/${RUNTIME_ASSET}"
            echo "- Runtime SHA-256: ${RUNTIME_SHA256}"
            echo "- Manual: ${MANUAL_VERSION} at ${MANUAL_PATH}"
            echo "- Matrix: ${MATRIX_REPOSITORY}@${MATRIX_REF}:${MATRIX_PATH}"
          } >> "${GITHUB_STEP_SUMMARY}"
        env:
          CONTRACTS_LINE: ${{ inputs.contracts_line }}
          MODE: ${{ inputs.mode }}
          EXAMPLES_TAG: ${{ steps.matrix.outputs.examples_tag }}
          CONTRACTS_VERSION: ${{ steps.matrix.outputs.contracts_npm_version }}
          CONTRACTS_RANGE: ${{ steps.matrix.outputs.contracts_range }}
          SDK_VERSION: ${{ steps.matrix.outputs.sdk_npm_version }}
          SDK_CONTRACTS_RANGE: ${{ steps.matrix.outputs.sdk_contracts_range }}
          RUNTIME_REPOSITORY: ${{ steps.matrix.outputs.runtime_repository }}
          RUNTIME_TAG: ${{ steps.matrix.outputs.runtime_tag }}
          RUNTIME_ASSET: ${{ steps.matrix.outputs.runtime_asset }}
          RUNTIME_SHA256: ${{ steps.matrix.outputs.runtime_sha256 }}
          MANUAL_VERSION: ${{ steps.matrix.outputs.manual_version }}
          MANUAL_PATH: ${{ steps.matrix.outputs.manual_path }}
          MATRIX_REPOSITORY: skenion/skenion
          MATRIX_REF: ${{ inputs.matrix_ref }}
          MATRIX_PATH: ${{ inputs.matrix_path }}
