name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runtime_ref:
        description: Runtime branch, tag, or SHA for explicit source integration smoke.
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SKENION_CONTRACTS_PACKAGE: "@skenion/contracts"

jobs:
  examples:
    name: Examples validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: node scripts/validate-compatibility-matrix-self-test.mjs
      - run: node scripts/validate-with-contracts.mjs
      - run: node scripts/validate-repo-path-references.mjs
      - run: node scripts/audit-node-conventions.mjs
      - run: node scripts/validate-runtime-project-payloads.mjs
      - run: node scripts/validate-runtime-session-smoke-fixtures.mjs

  runtime-source-integration:
    name: Runtime source integration smoke
    if: github.event_name == 'workflow_dispatch'
    needs: examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: skenion/skenion-runtime
          ref: ${{ inputs.runtime_ref }}
          path: .deps/skenion-runtime
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: |
          mkdir -p .deps/skenion-runtime/.deps
          ln -sfn "${GITHUB_WORKSPACE}" .deps/skenion-runtime/.deps/skenion-examples
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-examples-runtime-rust
          workspaces: .deps/skenion-runtime -> target
          cache-all-crates: "true"
          cache-on-failure: "true"
      - run: cargo build --manifest-path .deps/skenion-runtime/Cargo.toml --all-features
      - run: cargo test --manifest-path .deps/skenion-runtime/Cargo.toml --all-targets --all-features
      - run: SKENION_RUNTIME_BIN=.deps/skenion-runtime/target/debug/skenion-runtime bash scripts/validate-with-runtime.sh .deps/skenion-runtime
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 .deps/skenion-runtime/target/debug/skenion-runtime serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          READY=false
          for _ in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready" >&2
            exit 1
          fi
          SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-project-payloads.mjs
          SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-v01-projects.sh
          SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-session-smoke-fixtures.mjs
