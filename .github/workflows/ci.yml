name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          path: .deps/skenion-contracts
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-runtime
          path: .deps/skenion-runtime
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .deps/skenion-contracts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: .deps/skenion-contracts
      - run: pnpm run build
        working-directory: .deps/skenion-contracts
      - run: node scripts/validate-with-contracts.mjs
      - run: node scripts/audit-node-conventions.mjs
      - run: node scripts/validate-runtime-project-payloads.mjs
      - run: |
          mkdir -p .deps/skenion-runtime/.deps
          ln -sfn "${GITHUB_WORKSPACE}" .deps/skenion-runtime/.deps/skenion-examples
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-examples-runtime-rust
          workspaces: .deps/skenion-runtime -> target
          cache-all-crates: "true"
          cache-on-failure: "true"
      - run: cargo test --manifest-path .deps/skenion-runtime/Cargo.toml --all-targets --all-features
      - run: bash scripts/validate-with-runtime.sh .deps/skenion-runtime
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 cargo run --manifest-path .deps/skenion-runtime/Cargo.toml -- serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          READY=false
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready" >&2
            exit 1
          fi
          SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-project-payloads.mjs
          INFO="$(curl --fail --silent http://127.0.0.1:3761/v0/runtime/info)"
          if python3 -c 'import json, sys; r=json.loads(sys.argv[1]); sys.exit(0 if "session.render.generatedShader" in r.get("capabilities", []) else 1)' "${INFO}"; then
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-shader-diagnostics.sh
          else
            echo "runtime does not support shader diagnostics endpoint yet"
          fi
