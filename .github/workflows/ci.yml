name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          path: .deps/skenion-contracts
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-runtime
          path: .deps/skenion-runtime
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - name: Align cross-repo dependency branches
        if: github.event_name == 'pull_request'
        run: |
          for dep in .deps/skenion-contracts .deps/skenion-runtime; do
            (
              cd "${dep}"
              if git ls-remote --exit-code origin "refs/heads/${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
                git fetch --depth=1 origin "${GITHUB_HEAD_REF}"
                git checkout FETCH_HEAD
              fi
            )
          done
      - run: ln -sfn skenion-contracts .deps/Skenion-contracts
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            .deps/skenion-contracts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --frozen-lockfile
        working-directory: .deps/skenion-contracts
      - run: pnpm run build
        working-directory: .deps/skenion-contracts
      - run: node scripts/validate-with-contracts.mjs
      - run: node scripts/audit-node-conventions.mjs
      - run: node scripts/validate-runtime-project-payloads.mjs
      - run: node scripts/validate-runtime-session-smoke-fixtures.mjs
      - run: |
          mkdir -p .deps/skenion-runtime/.deps
          ln -sfn "${GITHUB_WORKSPACE}" .deps/skenion-runtime/.deps/skenion-examples
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-examples-runtime-rust
          workspaces: .deps/skenion-runtime -> target
          cache-all-crates: "true"
          cache-on-failure: "true"
      - run: cargo build --manifest-path .deps/skenion-runtime/Cargo.toml --all-features
      - run: cargo test --manifest-path .deps/skenion-runtime/Cargo.toml --all-targets --all-features
      - run: SKENION_RUNTIME_BIN=.deps/skenion-runtime/target/debug/skenion-runtime bash scripts/validate-with-runtime.sh .deps/skenion-runtime
      - run: SKENION_RUNTIME_BIN=.deps/skenion-runtime/target/debug/skenion-runtime bash scripts/smoke-runtime-audio-clock-domains.sh .deps/skenion-runtime
      - run: SKENION_RUNTIME_BIN=.deps/skenion-runtime/target/debug/skenion-runtime bash scripts/smoke-runtime-midi-clock-fixture.sh .deps/skenion-runtime
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 .deps/skenion-runtime/target/debug/skenion-runtime serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          READY=false
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready" >&2
            exit 1
          fi
          SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-project-payloads.mjs
          INFO="$(curl --fail --silent http://127.0.0.1:3761/v0/runtime/info)"
          if python3 -c 'import json, sys; r=json.loads(sys.argv[1]); sys.exit(0 if "session.render.generatedShader" in r.get("capabilities", []) else 1)' "${INFO}"; then
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-shader-diagnostics.sh
          else
            echo "runtime does not support shader diagnostics endpoint yet"
          fi
          SKENION_RUNTIME_URL=http://127.0.0.1:3761 node scripts/validate-runtime-session-smoke-fixtures.mjs
          if python3 -c 'import json, sys; r=json.loads(sys.argv[1]); sys.exit(0 if "session.control.messages" in r.get("capabilities", []) else 1)' "${INFO}"; then
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-object-routing-panel.sh
          else
            echo "runtime does not support control message payloads yet"
          fi
          if python3 -c 'import json, sys; caps=json.loads(sys.argv[1]).get("capabilities", []); sys.exit(0 if "session.preview.controlState" in caps and "session.control.messages" in caps else 1)' "${INFO}"; then
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-live-control-preview.sh
          else
            echo "runtime does not support message-based live preview control snapshots yet"
          fi
